$kind: http-request
name: List Members
method: GET
url: '{{baseUrl}}/api/projects/{{projectId}}/members'
order: 1000
description: |-
  Returns all members of the project. Requires the caller to be a member of the project
  (any role).

  **Response `200`** тАУ array of `ProjectMember` objects, each containing:
  - `id` тАУ the membership record ID
  - `role` тАУ `ADMIN` | `TRACKER` | `READER`
  - `createdAt`, `updatedAt`
  - `user` тАУ `{ id, name, email, image }`

  **Response `404`** тАУ if the project does not exist or the caller is not a member.
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 200', function () {
          pm.response.to.have.status(200);
      });

      pm.test('Response is a JSON array', function () {
          pm.expect(pm.response.json()).to.be.an('array');
      });

      pm.test('Each member has required fields', function () {
          const members = pm.response.json();
          members.forEach(function (member) {
              pm.expect(member).to.have.property('id');
              pm.expect(member).to.have.property('role');
              pm.expect(member).to.have.property('user');
              pm.expect(member.user).to.have.property('email');
          });
      });

      pm.test('Each member role is a valid value', function () {
          const validRoles = ['ADMIN', 'TRACKER', 'READER'];
          pm.response.json().forEach(function (member) {
              pm.expect(validRoles).to.include(member.role);
          });
      });

      // Persist the first non-self member ID for downstream requests if not already set.
      const members = pm.response.json();
      if (members.length > 0 && !pm.collectionVariables.get('memberId')) {
          pm.collectionVariables.set('memberId', members[0].id);
          console.log('memberId set to', members[0].id);
      }
