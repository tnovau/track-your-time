$kind: http-request
name: Stop Timer
method: PATCH
url: '{{baseUrl}}/api/time-entries/{{timeEntryId}}/stop'
order: 5000
description: |-
  Stops a running time entry by setting `endTime` to now and calculating `duration`.

  **Response `200`** – the updated entry object (with `endTime` and `duration` populated).
  **Response `404`** – if the entry is not found or is already stopped.
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Status is 200', function () {
          pm.response.to.have.status(200);
      });

      pm.test('Response is a JSON object', function () {
          pm.expect(pm.response.json()).to.be.an('object');
      });

      pm.test('Stopped entry has required fields', function () {
          const entry = pm.response.json();
          pm.expect(entry).to.have.property('id');
          pm.expect(entry).to.have.property('startTime');
          pm.expect(entry).to.have.property('endTime');
          pm.expect(entry).to.have.property('duration');
      });

      pm.test('Entry is now stopped (endTime and duration are not null)', function () {
          const entry = pm.response.json();
          pm.expect(entry.endTime).to.not.be.null;
          pm.expect(entry.duration).to.be.a('number').and.above(0);
      });
