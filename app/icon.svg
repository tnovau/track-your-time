<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="#4F46E5"/>

  <!-- Clock face -->
  <circle cx="16" cy="16" r="11" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>

  <!-- Hour markers at 12, 3, 6, 9 -->
  <line x1="16" y1="5" x2="16" y2="8" stroke="white" stroke-opacity="0.8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="27" y1="16" x2="24.5" y2="16" stroke="white" stroke-opacity="0.8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="27" x2="16" y2="24.5" stroke="white" stroke-opacity="0.8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="5" y1="16" x2="7.5" y2="16" stroke="white" stroke-opacity="0.8" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Hour hand (10 o'clock) -->
  <line x1="16" y1="16" x2="10.4" y2="12.75" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Minute hand (2 o'clock / 10 min) -->
  <line x1="16" y1="16" x2="23.4" y2="11.75" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="white"/>
</svg>
